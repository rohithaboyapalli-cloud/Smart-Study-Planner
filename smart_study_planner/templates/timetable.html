<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study Planner - Timetable</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container glass-card result-card">
        <div class="header no-print">
            <h2>Your Smart Timetable</h2>
            <p>We've successfully generated your optimized study schedule!</p>
            <div class="action-buttons">
                <a href="{{ url_for('setup') }}" class="btn-secondary">← Back to Setup</a>
                <button onclick="window.print()" class="btn-primary">🖨️ Print Schedule</button>
            </div>
        </div>
        
        <div class="print-header">
            <h2>My Study Schedule</h2>
            <p>Generated by Smart Study Planner</p>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time Slot</th>
                        <th>Subject</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in schedule %}
                    <tr>
                        <td class="fw-600">{{ row.date }}</td>
                        <td>{{ row.time_slot }}</td>
                        <td><span class="badge">{{ row.subject }}</span></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
